<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC-Car Rally — Rennleiter Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    padding: 20px;
  }
  .page-header {
    max-width: 900px;
    margin: 0 auto 24px;
  }
  .page-header h1 { font-size: 22px; color: #2B2B2B; }
  .page-header p { font-size: 13px; color: #888; margin-top: 2px; }
  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
  }
  .card h2 {
    font-size: 15px;
    font-weight: 700;
    color: #2B2B2B;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 2px solid #C8A415;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card.full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }
  input[type="number"], input[type="text"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    font-size: 14px;
    color: #2B2B2B;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #C8A415; }
  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-dark { background: #2B2B2B; color: white; }
  .btn-gold { background: #C8A415; color: white; }
  .btn-red { background: #C62828; color: white; }
  .msg {
    display: none;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    font-weight: 600;
  }
  .msg.ok { background: #E8F5E9; color: #2E7D32; }
  .msg.err { background: #FFEBEE; color: #C62828; }
  .fahrer-liste { margin-top: 0; }
  .fahrer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #F0F0F0;
    font-size: 14px;
  }
  .fahrer-item:last-child { border-bottom: none; }
  .fahrer-name { font-weight: 600; color: #2B2B2B; }
  .fahrer-info { font-size: 12px; color: #888; margin-top: 2px; }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.ok { background: #E8F5E9; color: #2E7D32; }
  .badge.nein { background: #F5F5F5; color: #888; }
  .nav-links {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: #888;
  }
  .nav-links a {
    color: #C8A415;
    text-decoration: none;
    font-weight: 600;
    margin: 0 8px;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>⚙️ Rennleiter-Dashboard</h1>
  <p>Verwaltung der RC-Car Rally 2026</p>
</div>

<div class="grid">

  <!-- Zeiten eintragen -->
  <div class="card">
    <h2>⏱️ Zeit eintragen</h2>
    <label>Fahrer-ID</label>
    <input type="number" id="zeitFahrerId" placeholder="z.B. 1" min="1">
    <label>Rundenzeit (Sekunden)</label>
    <input type="number" id="rundenzeit" placeholder="z.B. 45.3" step="0.01">
    <label>Strafzeit (Sekunden)</label>
    <input type="number" id="strafzeitZeit" placeholder="0.0" step="0.1" value="0">
    <button class="btn btn-dark" onclick="zeitEintragen()">Zeit speichern</button>
    <div class="msg" id="zeitMsg"></div>
  </div>

  <!-- Check-in -->
  <div class="card">
    <h2>✅ Fahrer Check-in</h2>
    <label>Fahrer-ID (vom QR-Code)</label>
    <input type="number" id="checkinId" placeholder="z.B. 1" min="1">
    <button class="btn btn-gold" onclick="checkin()" style="margin-top:16px">
      Fahrer einchecken
    </button>
    <div class="msg" id="checkinMsg"></div>

    <div style="height:1px;background:#F0F0F0;margin:20px 0"></div>

    <h2 style="border:none;padding:0;margin-bottom:12px">⚠️ Strafzeit eintragen</h2>
    <label>Fahrer-ID</label>
    <input type="number" id="strafFahrerId" placeholder="z.B. 1" min="1">
    <label>Strafzeit (Sekunden)</label>
    <input type="number" id="strafSekunden" placeholder="z.B. 5" step="0.5" min="0">
    <label>Grund</label>
    <input type="text" id="strafGrund" placeholder="z.B. Pylone umgefahren">
    <button class="btn btn-red" onclick="strafzeit()">Strafzeit eintragen</button>
    <div class="msg" id="strafMsg"></div>
  </div>

  <!-- Fahrerübersicht -->
  <div class="card full">
    <h2>👥 Alle Fahrer
      <button onclick="faehrerLaden()"
        style="margin-left:auto;background:none;border:1.5px solid #E0E0E0;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;color:#555">
        ↻ Laden
      </button>
    </h2>
    <div id="fahrerListe" class="fahrer-liste">
      <p style="color:#888;font-size:14px">Klicke auf "Laden" um die Fahrerliste anzuzeigen.</p>
    </div>
  </div>

</div>

<div class="nav-links">
  <a href="index.html">📝 Registrierung</a>
  <a href="leaderboard.html">📊 Leaderboard</a>
</div>

<script>
function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function zeitEintragen() {
  const fahrer_id = parseInt(document.getElementById('zeitFahrerId').value);
  const rundenzeit = parseFloat(document.getElementById('rundenzeit').value);
  const strafzeit = parseFloat(document.getElementById('strafzeitZeit').value) || 0;
  if (!fahrer_id || !rundenzeit) return showMsg('zeitMsg','Alle Felder ausfullen!',false);
  try {
    const res = await fetch('http://127.0.0.1:8000/zeiten', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({fahrer_id, rundenzeit, strafzeit})
    });
    const data = await res.json();
    if (!res.ok) return showMsg('zeitMsg', data.detail, false);
    showMsg('zeitMsg', `Zeit gespeichert! Gesamtzeit: ${data.gesamtzeit.toFixed(2)}s`, true);
    document.getElementById('zeitFahrerId').value = '';
    document.getElementById('rundenzeit').value = '';
    document.getElementById('strafzeitZeit').value = '0';
  } catch(e) { showMsg('zeitMsg','Server nicht erreichbar.',false); }
}

async function checkin() {
  const id = parseInt(document.getElementById('checkinId').value);
  if (!id) return showMsg('checkinMsg','Fahrer-ID eingeben!',false);
  try {
    const res = await fetch(`http://127.0.0.1:8000/checkin/${id}`, {method:'POST'});
    const data = await res.json();
    if (!res.ok) return showMsg('checkinMsg', data.detail, false);
    showMsg('checkinMsg', `${data.message}`, true);
    document.getElementById('checkinId').value = '';
    faehrerLaden();
  } catch(e) { showMsg('checkinMsg','Server nicht erreichbar.',false); }
}

async function strafzeit() {
  const fahrer_id = parseInt(document.getElementById('strafFahrerId').value);
  const strafzeit = parseFloat(document.getElementById('strafSekunden').value);
  const grund = document.getElementById('strafGrund').value.trim();
  if (!fahrer_id || !strafzeit || !grund) return showMsg('strafMsg','Alle Felder ausfullen!',false);
  try {
    const res = await fetch('http://127.0.0.1:8000/strafzeiten', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({fahrer_id, strafzeit, grund})
    });
    const data = await res.json();
    if (!res.ok) return showMsg('strafMsg', data.detail, false);
    showMsg('strafMsg', data.message, true);
    document.getElementById('strafFahrerId').value = '';
    document.getElementById('strafSekunden').value = '';
    document.getElementById('strafGrund').value = '';
  } catch(e) { showMsg('strafMsg','Server nicht erreichbar.',false); }
}

async function faehrerLaden() {
  try {
    const res = await fetch('http://127.0.0.1:8000/fahrer');
    const daten = await res.json();
    const container = document.getElementById('fahrerListe');
    if (daten.length === 0) {
      container.innerHTML = '<p style="color:#888;font-size:14px">Noch keine Fahrer registriert.</p>';
      return;
    }
    container.innerHTML = daten.map(f => `
      <div class="fahrer-item">
        <div>
          <div class="fahrer-name">#${f.startnummer} — ${f.name}</div>
          <div class="fahrer-info">${f.fahrzeug} · ${f.email} · ID: ${f.id}</div>
        </div>
        <span class="badge ${f.eingecheckt ? 'ok' : 'nein'}">
          ${f.eingecheckt ? '✓ Eingecheckt' : 'Ausstehend'}
        </span>
      </div>`).join('');
  } catch(e) {
    document.getElementById('fahrerListe').innerHTML =
      '<p style="color:#C62828;font-size:14px">Server nicht erreichbar.</p>';
  }
}

faehrerLaden();
</script>
</body>
</html>
